<!DOCTYPE html>
<html>
<head>
    <title>Employee Attendance</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 400px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            margin-top: 20px;
            background: #f1f1f1;
            padding: 10px;
            border-radius: 5px;
        }

        .result p {
            margin: 5px 0;
        }

        @media (max-width: 500px) {
            .container {
                width: 90%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Employee Attendance</h2>

    <form method="POST">
        <input type="text" name="attendance" placeholder="Enter P/A (e.g. P,A,P,A)" required>
        <button type="submit">Calculate</button>
    </form>

    {% if result %}
    <div class="result">
        <p><b>Total Days:</b> {{ result.total }}</p>
        <p><b>Present:</b> {{ result.present }}</p>
        <p><b>Absent:</b> {{ result.absent }}</p>
        <p><b>Percentage:</b> {{ result.percentage }}%</p>
    </div>
    {% endif %}
</div>

</body>
</html>
